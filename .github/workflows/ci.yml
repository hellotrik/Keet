name: CI

on:
  push:
    branches:
      - ratatui
  pull_request:
    branches:
      - ratatui

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # - os: ubuntu-latest
          #   target: x86_64-unknown-linux-gnu
          #   bin: keet
          #   out: keet-linux-x86_64
          # - os: macos-latest
          #   target: x86_64-apple-darwin
          #   bin: keet
          #   out: keet-macos-x86_64
          # - os: macos-latest
          #   target: aarch64-apple-darwin
          #   bin: keet
          #   out: keet-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: keet.exe
            out: keet-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "ci-${{ matrix.os }}-${{ matrix.target }}"
          shared-key: "${{ hashFiles('Cargo.lock') }}"

      # Linux system dependencies
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
