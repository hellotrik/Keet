name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build + Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # - os: ubuntu-latest
          #   target: x86_64-unknown-linux-gnu
          #   bin: keet
          #   out: keet-${{ github.ref_name }}-linux-x86_64
          # - os: macos-latest
          #   target: x86_64-apple-darwin
          #   bin: keet
          #   out: keet-${{ github.ref_name }}-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: keet
            out: keet-${{ github.ref_name }}-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: keet.exe
            out: keet-${{ github.ref_name }}-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Sync Cargo.toml version with the git tag (strip leading 'v')
      - name: Set version from tag (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Set version from tag (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content Cargo.toml

      # Linux system dependencies
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.bin }}

      - name: Compress (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          tar -czf ${{ matrix.out }}.tar.gz ${{ matrix.bin }}

      - name: Compress (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          powershell Compress-Archive -Path ${{ matrix.bin }} -DestinationPath ${{ matrix.out }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz,dist/*.zip
