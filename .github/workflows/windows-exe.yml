# 万丈红尘缤纷彩，天涯云水路遥长。
# 此刻风流归天地，不胜水中明月光。
# sourceBook: 蛊真人
# sourceRef: 《蛊真人》全诗词整理（完整版）
# sourceKind: poem
# spellName: 白凝冰·龙女（其一）

name: Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows-exe:
    name: Build keet.exe (windows-latest)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build (release)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload keet.exe
        uses: actions/upload-artifact@v4
        with:
          name: keet-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/keet.exe
